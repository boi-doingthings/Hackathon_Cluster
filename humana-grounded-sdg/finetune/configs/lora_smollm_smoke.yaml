# CPU/GPU smoke config — tiny model, few steps
model_name_or_path: HuggingFaceTB/SmolLM2-135M-Instruct
output_dir: outputs/smoke-smollm135-lora
train_file: data/support_sft_train.jsonl
val_file: data/support_sft_val.jsonl
